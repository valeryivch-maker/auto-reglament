name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Flet
      run: |
        pip install flet

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Build APK and Get Link
      run: |
        echo "y" | flet build apk
        echo "=== ССЫЛКА НА СКАЧИВАНИЕ APK ДЛЯ ТЕЛЕФОНА ==="
        APK_PATH=$(find . -name "*.apk" | head -n 1)
        if [ -f "$APK_PATH" ]; then
          curl -L --upload-file "$APK_PATH" https://bashupload.com
        else
          echo "ОШИБКА: Файл APK не найден в системе!"
        fi
        echo "============================================="
